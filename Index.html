<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>SISEOP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body id="main-container" class="default" style="background-color: #7b7d7d">
    <div class="container" style="background-color: #ccd1d1">
      <div class="row vh-100 align-items-center">
        <h1 class="text-center">
          Sistema de Seguimiento de Obras Públicas
          <br>
          "SISEOP"
        </h1>
        <div class="row g-2">
          <div class="col-5 text-end"> 
            <img
              src="https://cdn.glitch.global/415da8bf-75f2-46e4-8d5d-bce9c6d4673b/Logotipo%20sin%20fondo%20-%20copia.png?v=1728097065368"
              width="200"
              height="200"
            />
          </div>
          <div class="col-7">
            <!-- CAMBIO CLAVE: action apunta directamente a login.php -->
            <form action="login.php" class="row row-eq-height" method="post">
              <div class="login-form col-5 col-sm-7">
                <div class="form-group mb-3">
                  <label for="emailaddress">Correo electrónico</label>
                  <input
                    class="form-control"
                    type="email"
                    id="emailaddress"
                    name="email"
                    required=""
                    placeholder="Ingresa tu Correo electrónico"
                    autofocus=""
                  />
                </div>
                <div class="form-group mb-3">
                  <label for="password">Contraseña</label>
                  <input
                    class="form-control"
                    type="password"
                    required=""
                    name="password"
                    id="password"
                    placeholder="Ingresa la contraseña"
                  />
                </div>
                
                <!-- Este div de alerta ya no es funcional sin JavaScript -->
                <div id="alertMessage" class="alert d-none"></div>

                <div class="form-group mb-0">
                  <button
                    class="btn btn-primary"
                    type="submit"
                    data-loading-text="Iniciando..."
                  >
                    Iniciar sesión
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
